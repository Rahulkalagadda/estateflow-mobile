name: Build Android Release (AAB)

on:
  push:
    branches: [main, master]
  workflow_dispatch:  # Allows manual trigger from GitHub UI

jobs:
  build:
    name: Build Signed Android App Bundle
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Java (required for Android build tools)
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # 3. Setup Flutter
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.7'
          channel: stable

      # 4. Get Flutter dependencies
      - name: Install dependencies
        run: flutter pub get

      # 5. Decode the keystore from GitHub Secret and write to disk
      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      # 6. Create key.properties from GitHub Secrets
      - name: Create key.properties
        run: |
          cat > android/key.properties <<EOF
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      # 7. Build the signed App Bundle
      - name: Build Release App Bundle (AAB)
        run: |
          flutter build appbundle --release \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=SOCKET_URL=${{ secrets.SOCKET_URL }}

      # 8. Also build a universal APK for direct installation
      - name: Build Release APK
        run: |
          flutter build apk --release \
            --dart-define=API_BASE_URL=${{ secrets.API_BASE_URL }} \
            --dart-define=SOCKET_URL=${{ secrets.SOCKET_URL }}

      # 9. Upload AAB as downloadable artifact (available in GitHub Actions)
      - name: Upload App Bundle (AAB)
        uses: actions/upload-artifact@v4
        with:
          name: estateflow-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      # 10. Upload APK as downloadable artifact
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: estateflow-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
